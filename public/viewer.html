<!DOCTYPE html>
<html>
<head>
<style>body { margin: 0; overflow: hidden; background: #222; }</style>
</head>
<body>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x222222);
const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.01, 1000);
camera.position.set(0, 3, 3);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

scene.add(new THREE.AmbientLight(0xffffff, 1.0));
const d1 = new THREE.DirectionalLight(0xffffff, 0.8);
d1.position.set(5, 10, 5);
scene.add(d1);
scene.add(new THREE.GridHelper(4, 10, 0x444444, 0x333333));

let currentModel = null;

function loadModel(url) {
  if (currentModel) { scene.remove(currentModel); currentModel = null; }
  if (!url) return;

  fetch(url)
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.arrayBuffer();
    })
    .then(buf => {
      new GLTFLoader().parse(buf, '', (gltf) => {
        const model = gltf.scene;
        model.traverse(child => {
          if (!child.isMesh) return;
          child.material.side = THREE.DoubleSide;
          if (child.geometry.attributes.color) {
            child.material.vertexColors = true;
            child.material.color = new THREE.Color(0xffffff);
            child.material.needsUpdate = true;
          }
        });

        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const s = maxDim > 0 ? 2 / maxDim : 1;

        model.position.set(-center.x, -center.y, -center.z);
        const group = new THREE.Group();
        group.scale.setScalar(s);
        group.add(model);
        scene.add(group);
        currentModel = group;

        const ss = size.clone().multiplyScalar(s);
        const isFlat = ss.y < 0.1 * Math.max(ss.x, ss.z);
        controls.target.set(0, 0, 0);
        if (isFlat) {
          camera.position.set(0, 4, 0.5);
        } else {
          camera.position.set(0, 1.5, 3);
        }
        controls.update();
      });
    })
    .catch(err => console.error('Load error:', err));
}

// Listen for messages from parent React app
window.addEventListener('message', (e) => {
  if (e.data?.type === 'loadModel') {
    loadModel(e.data.url);
  }
});

// Signal to parent that we're ready to receive messages
if (window.parent !== window) {
  window.parent.postMessage({ type: 'viewerReady' }, '*');
}

// Also check URL param for direct testing
const urlParam = new URLSearchParams(location.search).get('url');
if (urlParam) loadModel(urlParam);

(function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
})();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
