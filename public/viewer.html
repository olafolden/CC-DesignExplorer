<!DOCTYPE html>
<html>
<head>
<style>body { margin: 0; overflow: hidden; background: #222; }</style>
</head>
<body>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x222222);
const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.01, 1000);
camera.position.set(0, 3, 3);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
scene.add(dirLight);

let gridHelper = new THREE.GridHelper(4, 10, 0x444444, 0x333333);
scene.add(gridHelper);

let currentModel = null;
let contextModel = null;
let referenceTransform = null; // { scale, center } from context model
let currentSettings = null;

// Store default camera position for reset
let defaultCameraPos = new THREE.Vector3(0, 3, 3);
let defaultTarget = new THREE.Vector3(0, 0, 0);

// Sun path visualization
const defaultDirLightPos = new THREE.Vector3(5, 10, 5);
let sunArcLine = null;
let sunMarker = null;

function computeTransform(model) {
  const box = new THREE.Box3().setFromObject(model);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const scale = maxDim > 0 ? 2 / maxDim : 1;
  return { scale, center, size };
}

function addModelWithTransform(model, transform) {
  model.position.set(-transform.center.x, -transform.center.y, -transform.center.z);
  const group = new THREE.Group();
  group.scale.setScalar(transform.scale);
  group.add(model);
  return group;
}

function loadContextModel(url) {
  if (contextModel) { scene.remove(contextModel); contextModel = null; }
  if (!url) { referenceTransform = null; return; }

  fetch(url)
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.arrayBuffer();
    })
    .then(buf => {
      new GLTFLoader().parse(buf, '', (gltf) => {
        const model = gltf.scene;
        referenceTransform = computeTransform(model);
        const group = addModelWithTransform(model, referenceTransform);

        // Make context semi-transparent
        group.traverse(child => {
          if (!child.isMesh) return;
          child.material = child.material.clone();
          child.material.transparent = true;
          child.material.opacity = 0.3;
          child.material.side = THREE.DoubleSide;
          child.material.needsUpdate = true;
        });

        scene.add(group);
        contextModel = group;

        // Auto-fit camera to context
        const ss = referenceTransform.size.clone().multiplyScalar(referenceTransform.scale);
        const isFlat = ss.y < 0.1 * Math.max(ss.x, ss.z);
        controls.target.set(0, 0, 0);
        if (isFlat) {
          camera.position.set(0, 4, 0.5);
        } else {
          camera.position.set(0, 1.5, 3);
        }
        defaultCameraPos.copy(camera.position);
        defaultTarget.copy(controls.target);
        controls.update();
      });
    })
    .catch(err => console.error('Context load error:', err));
}

function applyMaterialSettings(model, settings) {
  if (!model || !settings) return;
  model.traverse(child => {
    if (!child.isMesh) return;
    child.material.wireframe = settings.wireframe;
    child.material.opacity = settings.opacity;
    child.material.transparent = settings.opacity < 1;
    child.material.side = settings.doubleSided ? THREE.DoubleSide : THREE.FrontSide;
    child.material.needsUpdate = true;
  });
}

function applySettings(settings) {
  if (!settings) return;
  currentSettings = settings;

  // Background
  scene.background.set(settings.backgroundColor);

  // Grid
  gridHelper.visible = settings.gridVisible;

  // Lighting
  ambientLight.intensity = settings.ambientIntensity;
  dirLight.intensity = settings.directionalIntensity;
  renderer.toneMappingExposure = settings.exposure;

  // Camera
  controls.autoRotate = settings.autoRotate;
  if (camera.fov !== settings.fov) {
    camera.fov = settings.fov;
    camera.updateProjectionMatrix();
  }

  // Material — apply to current model
  if (currentModel) {
    applyMaterialSettings(currentModel, settings);
  }
}

function loadModel(url, preserveCamera) {
  if (currentModel) { scene.remove(currentModel); currentModel = null; }
  if (!url) return;

  fetch(url)
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.arrayBuffer();
    })
    .then(buf => {
      new GLTFLoader().parse(buf, '', (gltf) => {
        const model = gltf.scene;
        model.traverse(child => {
          if (!child.isMesh) return;
          child.material.side = THREE.DoubleSide;
          if (child.geometry.attributes.color) {
            child.material.vertexColors = true;
            child.material.color = new THREE.Color(0xffffff);
            child.material.needsUpdate = true;
          }
        });

        // Use shared coordinate space from context model, or independent auto-fit
        const transform = referenceTransform ?? computeTransform(model);
        const group = addModelWithTransform(model, transform);
        scene.add(group);
        currentModel = group;

        if (!preserveCamera) {
          const ss = transform.size.clone().multiplyScalar(transform.scale);
          const isFlat = ss.y < 0.1 * Math.max(ss.x, ss.z);
          controls.target.set(0, 0, 0);
          if (isFlat) {
            camera.position.set(0, 4, 0.5);
          } else {
            camera.position.set(0, 1.5, 3);
          }
          defaultCameraPos.copy(camera.position);
          defaultTarget.copy(controls.target);
        }
        controls.update();

        // Re-apply material settings after model load
        if (currentSettings) {
          applyMaterialSettings(group, currentSettings);
        }
      });
    })
    .catch(err => console.error('Load error:', err));
}

function updateSunPath(enabled, sunPosition, arcPoints) {
  // Remove old sun visualization
  if (sunArcLine) { scene.remove(sunArcLine); sunArcLine = null; }
  if (sunMarker) { scene.remove(sunMarker); sunMarker = null; }

  if (!enabled || !sunPosition) {
    // Restore default directional light position
    dirLight.position.copy(defaultDirLightPos);
    return;
  }

  // Draw arc line
  if (arcPoints && arcPoints.length > 1) {
    const points = arcPoints.map(p => new THREE.Vector3(p.x, p.y, p.z));
    const geometry = new THREE.BufferGeometry().setFromPoints(points);
    const material = new THREE.LineBasicMaterial({
      color: 0xffaa00,
      transparent: true,
      opacity: 0.6,
    });
    sunArcLine = new THREE.Line(geometry, material);
    scene.add(sunArcLine);
  }

  // Sun marker (small sphere)
  const markerGeo = new THREE.SphereGeometry(0.1, 16, 16);
  const markerMat = new THREE.MeshBasicMaterial({ color: 0xffdd44 });
  sunMarker = new THREE.Mesh(markerGeo, markerMat);
  sunMarker.position.set(sunPosition.x, sunPosition.y, sunPosition.z);
  scene.add(sunMarker);

  // Move directional light to match sun position
  dirLight.position.set(sunPosition.x, sunPosition.y, sunPosition.z);
}

// Listen for messages from parent React app
window.addEventListener('message', (e) => {
  if (e.data?.type === 'loadContext') {
    loadContextModel(e.data.url);
  } else if (e.data?.type === 'loadModel') {
    loadModel(e.data.url, e.data.preserveCamera ?? false);
  } else if (e.data?.type === 'updateSettings') {
    applySettings(e.data.settings);
  } else if (e.data?.type === 'resetCamera') {
    camera.position.copy(defaultCameraPos);
    controls.target.copy(defaultTarget);
    controls.update();
  } else if (e.data?.type === 'updateSunPath') {
    updateSunPath(e.data.enabled, e.data.sunPosition, e.data.arcPoints);
  }
});

// Signal to parent that we're ready to receive messages
if (window.parent !== window) {
  window.parent.postMessage({ type: 'viewerReady' }, '*');
}

// Also check URL param for direct testing
const urlParam = new URLSearchParams(location.search).get('url');
if (urlParam) loadModel(urlParam);

(function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
})();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
